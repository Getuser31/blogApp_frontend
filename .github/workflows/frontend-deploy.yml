name: Deploy Frontend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Files and Run Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to the folder
            cd /var/www/html/blogApp_frontend
            
              # Fix git ownership issue
            git config --global --add safe.directory /var/www/html/blogApp_frontend
            
            # Discard local changes to allow pull
            git reset --hard

            # 2. Pull the latest code
            git pull origin main

            # 3. Install dependencies
            npm install

            # 4. Run tests
            npm test

            # 5. Build assets
            npm run build
