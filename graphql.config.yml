# This file configures the JetBrains GraphQL plugin
schema:
  - url: ${env:VITE_GRAPHQL_ENDPOINT}
    headers:
      # This token is sourced from the .env.local file generated by `npm run get-token`
      Authorization: ${env:GRAPHQL_IDE_TOKEN}

extensions:
  endpoints:
    default:
      url: ${env:VITE_GRAPHQL_ENDPOINT}
      introspect: false

documents: "src/**/*.{js,jsx}"
projects:
