# This file configures the JetBrains GraphQL plugin
schema:
  - url: ${env:VITE_GRAPHQL_ENDPOINT}
    headers:
      # This token is sourced from the .env.development file generated by `npm run get-token`
      Authorization: ${env:GRAPHQL_IDE_TOKEN}

# Point to the .env file to resolve the endpoint URL
extensions:
  endpoints:
    default:
      url: ${env:VITE_GRAPHQL_ENDPOINT}
      introspect: false

documents: "src/**/*.{js,jsx}"
projects:
